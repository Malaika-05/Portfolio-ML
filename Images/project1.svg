<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>
  <!-- glow orbs -->
  <circle cx="400" cy="225" r="160" fill="#00d4ff" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="200" cy="100" r="80" fill="#7b2fff" opacity="0.07" filter="url(#blur1)"/>
  <!-- circuit lines -->
  <line x1="50" y1="225" x2="200" y2="225" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="225" x2="750" y2="225" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="50" x2="400" y2="140" stroke="#7b2fff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="310" x2="400" y2="400" stroke="#7b2fff" stroke-width="1" opacity="0.3"/>
  <!-- brain/AI icon circle -->
  <circle cx="400" cy="225" r="90" fill="none" stroke="url(#glow1)" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="225" r="70" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <!-- brain dots -->
  <circle cx="400" cy="225" r="10" fill="#00d4ff" opacity="0.9"/>
  <circle cx="370" cy="200" r="5" fill="#7b2fff" opacity="0.8"/>
  <circle cx="430" cy="200" r="5" fill="#7b2fff" opacity="0.8"/>
  <circle cx="360" cy="235" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="440" cy="235" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="380" cy="255" r="5" fill="#7b2fff" opacity="0.7"/>
  <circle cx="420" cy="255" r="5" fill="#7b2fff" opacity="0.7"/>
  <!-- connecting lines inside -->
  <line x1="400" y1="225" x2="370" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="225" x2="430" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="225" x2="360" y2="235" stroke="#7b2fff" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="225" x2="440" y2="235" stroke="#7b2fff" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="225" x2="380" y2="255" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="225" x2="420" y2="255" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <!-- chat bubbles left -->
  <rect x="80" y="160" width="160" height="40" rx="20" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="185" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12">Explain neural nets?</text>
  <rect x="80" y="215" width="130" height="40" rx="20" fill="#1a1a2e" stroke="#7b2fff" stroke-width="1.5" opacity="0.8"/>
  <text x="145" y="240" text-anchor="middle" fill="#7b2fff" font-family="monospace" font-size="12">Quiz me on ML!</text>
  <rect x="80" y="270" width="145" height="40" rx="20" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <text x="152" y="295" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12">Summarize this doc</text>
  <!-- chat bubbles right -->
  <rect x="560" y="160" width="160" height="50" rx="10" fill="#0d1b3e" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="640" y="180" text-anchor="middle" fill="#aaeeff" font-family="monospace" font-size="11">Sure! Neural networks</text>
  <text x="640" y="197" text-anchor="middle" fill="#aaeeff" font-family="monospace" font-size="11">are layers of nodes...</text>
  <rect x="560" y="225" width="160" height="50" rx="10" fill="#0d1b3e" stroke="#7b2fff" stroke-width="1" opacity="0.8"/>
  <text x="640" y="245" text-anchor="middle" fill="#ccaaff" font-family="monospace" font-size="11">Q: What is gradient</text>
  <text x="640" y="262" text-anchor="middle" fill="#ccaaff" font-family="monospace" font-size="11">descent? (A/B/C/D)</text>
  <!-- title -->
  <text x="400" y="390" text-anchor="middle" fill="white" font-family="monospace" font-size="22" font-weight="bold" opacity="0.9">NOVA</text>
  <text x="400" y="415" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="13" opacity="0.7">AI Study Assistant</text>
</svg>