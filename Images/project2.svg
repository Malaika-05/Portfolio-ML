<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <circle cx="400" cy="220" r="200" fill="#00ff88" opacity="0.03" filter="url(#gf)"/>
  <!-- main image frame -->
  <rect x="160" y="80" width="480" height="280" rx="8" fill="#111" stroke="#00ff88" stroke-width="2" opacity="0.9"/>
  <!-- scene inside frame -->
  <rect x="168" y="88" width="464" height="264" fill="#1a1a1a"/>
  <!-- sky gradient -->
  <rect x="168" y="88" width="464" height="100" fill="#1c2a3a"/>
  <!-- ground -->
  <rect x="168" y="270" width="464" height="82" fill="#1a1a0a"/>
  <!-- person silhouette -->
  <ellipse cx="320" cy="260" rx="25" ry="8" fill="#0a0a0a" opacity="0.5"/>
  <rect x="308" y="190" width="24" height="70" rx="4" fill="#2a2a3a"/>
  <circle cx="320" cy="178" r="18" fill="#2a2a3a"/>
  <!-- car silhouette -->
  <rect x="450" y="230" width="110" height="50" rx="6" fill="#1a2030"/>
  <rect x="465" y="210" width="80" height="30" rx="4" fill="#1a2030"/>
  <circle cx="470" cy="282" r="12" fill="#0a0a0a"/>
  <circle cx="550" cy="282" r="12" fill="#0a0a0a"/>
  <!-- YOLO bounding boxes -->
  <rect x="300" y="162" width="40" height="110" fill="none" stroke="#00ff88" stroke-width="2.5"/>
  <rect x="297" y="159" width="90" height="16" rx="2" fill="#00ff88"/>
  <text x="300" y="171" fill="#0a0a0a" font-family="monospace" font-size="11" font-weight="bold">Person 98%</text>
  <rect x="442" y="205" width="126" height="82" fill="none" stroke="#ff4444" stroke-width="2.5"/>
  <rect x="442" y="192" width="80" height="16" rx="2" fill="#ff4444"/>
  <text x="445" y="204" fill="white" font-family="monospace" font-size="11" font-weight="bold">Car 95%</text>
  <!-- scan line effect -->
  <line x1="168" y1="200" x2="632" y2="200" stroke="#00ff88" stroke-width="1" opacity="0.15"/>
  <line x1="168" y1="240" x2="632" y2="240" stroke="#00ff88" stroke-width="1" opacity="0.1"/>
  <!-- corner markers -->
  <line x1="160" y1="95" x2="180" y2="95" stroke="#00ff88" stroke-width="3"/>
  <line x1="160" y1="95" x2="160" y2="115" stroke="#00ff88" stroke-width="3"/>
  <line x1="632" y1="95" x2="612" y2="95" stroke="#00ff88" stroke-width="3"/>
  <line x1="632" y1="95" x2="632" y2="115" stroke="#00ff88" stroke-width="3"/>
  <line x1="160" y1="355" x2="180" y2="355" stroke="#00ff88" stroke-width="3"/>
  <line x1="160" y1="355" x2="160" y2="335" stroke="#00ff88" stroke-width="3"/>
  <line x1="632" y1="355" x2="612" y2="355" stroke="#00ff88" stroke-width="3"/>
  <line x1="632" y1="355" x2="632" y2="335" stroke="#00ff88" stroke-width="3"/>
  <!-- title -->
  <text x="400" y="400" text-anchor="middle" fill="white" font-family="monospace" font-size="20" font-weight="bold">YOLO Vision App</text>
  <text x="400" y="425" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="12" opacity="0.7">Real-time Object Detection</text>
</svg>