<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <filter id="gf3"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <circle cx="400" cy="225" r="180" fill="#ff4444" opacity="0.04" filter="url(#gf3)"/>
  <circle cx="580" cy="150" r="80" fill="#22cc66" opacity="0.04" filter="url(#gf3)"/>
  <!-- envelope icon large -->
  <rect x="270" y="130" width="260" height="180" rx="10" fill="#1a1020" stroke="#ff4444" stroke-width="2"/>
  <polyline points="270,130 400,220 530,130" fill="none" stroke="#ff4444" stroke-width="2"/>
  <!-- spam email - red glow -->
  <rect x="80" y="100" width="160" height="100" rx="8" fill="#200a0a" stroke="#ff4444" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="125" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="11" font-weight="bold">⚠ SPAM</text>
  <text x="160" y="143" text-anchor="middle" fill="#ff8888" font-family="monospace" font-size="10">WIN $1,000,000!</text>
  <text x="160" y="158" text-anchor="middle" fill="#ff8888" font-family="monospace" font-size="10">Click here now!</text>
  <text x="160" y="173" text-anchor="middle" fill="#ff8888" font-family="monospace" font-size="10">Limited offer!!!</text>
  <text x="160" y="193" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="18">✕</text>
  <!-- ham email - green -->
  <rect x="80" y="240" width="160" height="100" rx="8" fill="#0a200a" stroke="#22cc66" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="265" text-anchor="middle" fill="#22cc66" font-family="monospace" font-size="11" font-weight="bold">✓ SAFE</text>
  <text x="160" y="283" text-anchor="middle" fill="#88ff88" font-family="monospace" font-size="10">Meeting at 3pm</text>
  <text x="160" y="298" text-anchor="middle" fill="#88ff88" font-family="monospace" font-size="10">Project update</text>
  <text x="160" y="313" text-anchor="middle" fill="#88ff88" font-family="monospace" font-size="10">Q3 report attached</text>
  <text x="160" y="333" text-anchor="middle" fill="#22cc66" font-family="monospace" font-size="18">✓</text>
  <!-- arrows to center -->
  <line x1="240" y1="150" x2="270" y2="200" stroke="#ff4444" stroke-width="2" opacity="0.7"/>
  <line x1="240" y1="290" x2="270" y2="260" stroke="#22cc66" stroke-width="2" opacity="0.7"/>
  <!-- NLP labels right -->
  <text x="560" y="175" fill="#aaaaff" font-family="monospace" font-size="12">TF-IDF vectorizer</text>
  <text x="560" y="195" fill="#aaaaff" font-family="monospace" font-size="12">Naive Bayes model</text>
  <text x="560" y="215" fill="#aaaaff" font-family="monospace" font-size="12">NLP preprocessing</text>
  <text x="560" y="235" fill="#aaaaff" font-family="monospace" font-size="12">99.1% accuracy</text>
  <line x1="530" y1="218" x2="555" y2="175" stroke="#aaaaff" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="218" x2="555" y2="195" stroke="#aaaaff" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="218" x2="555" y2="215" stroke="#aaaaff" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="218" x2="555" y2="235" stroke="#aaaaff" stroke-width="1" opacity="0.4"/>
  <!-- title -->
  <text x="400" y="390" text-anchor="middle" fill="white" font-family="monospace" font-size="20" font-weight="bold">MailGuard AI</text>
  <text x="400" y="415" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="12" opacity="0.7">Email Spam Classifier</text>
</svg>